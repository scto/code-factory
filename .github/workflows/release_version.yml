name: Update README with Latest Release

on:
  release:
    types: [published]

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update README manually
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Updating to version: $VERSION"
          
          # Обновляем README.md - обратите внимание на шаблон поиска
          sed -i "s/ksp(\"io.github.antonbutov:code-factory-processor:[0-9]*\.[0-9]*\.[0-9]*\")/ksp(\"io.github.antonbutov:code-factory-processor:$VERSION\")/g" README.md
          
          # Проверяем, были ли изменения
          if git diff --quiet README.md; then
            echo "No changes to README.md"
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          else
            echo "README.md was updated"
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          fi
        id: update_readme

      - name: Create Pull Request
        if: steps.update_readme.outputs.HAS_CHANGES == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Update README with latest release version ${{ steps.get_version.outputs.VERSION }}'
          title: 'Update README for new release ${{ steps.get_version.outputs.VERSION }}'
          body: |
            This PR updates the README file with the latest release version ${{ steps.get_version.outputs.VERSION }}.
            
            Automatically generated by GitHub Actions.
          branch: 'update-readme'
          base: 'trunk'

      - name: Debug Information
        run: |
          echo "Current README content after update attempt:"
          cat README.md
          echo "---"
          echo "Latest release version: ${{ steps.get_version.outputs.VERSION }}"
          echo "---"
          echo "Git status:"
          git status
