name: Update README with Latest Release

on:
  release:
    types: [published] 

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update files
        uses: MathieuSoysal/file-updater-for-release@v1.0.3
        with:
          files: README.md 
          prefix: "code-factory-processor:" 

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Update README with latest release version'
          title: 'Update README for new release'
          body: 'This PR updates the README file with the latest release version.'
          branch: 'update-readme'
          base: 'trunk'
